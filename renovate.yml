# renovate.yml
extends:
  - config:base

# Automatically detect package managers in the repo
autodiscover: true

# Branch prefix for PRs
branchPrefix: "renovate/"

# Separate major updates into their own PRs
separateMajorReleases: true

# Commit message template
commitMessageAction: "update"
commitMessageTopic: "{{depName}}"

# Labels for PRs
labels:
  - "renovate"
  - "dependencies"

# Optional: Ignore node_modules, vendor, and other common directories
ignorePaths:
  - "node_modules/**"
  - "vendor/**"
  - ".venv/**"

# Enable dependency dashboard (optional)
dependencyDashboard: true

# Optional: Pin versions for certain ecosystems if you want
packageRules:
  - matchPackagePatterns: ["*"]
    enabled: true
    updateTypes:
      - minor
      - patch
      - major
