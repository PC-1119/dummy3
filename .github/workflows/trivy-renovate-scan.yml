name: Renovate Security Scan

on:
  workflow_dispatch:
  push:
    branches:
      - renovate/all-non-breaking-dependencies

jobs:
  trivy-scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y wget jq
          # Get latest Trivy release dynamically
          TRIVY_VERSION=$(curl -s https://api.github.com/repos/aquasecurity/trivy/releases/latest | jq -r .tag_name)
          wget https://github.com/aquasecurity/trivy/releases/download/${TRIVY_VERSION}/trivy_${TRIVY_VERSION#v}_Linux-64bit.deb
          sudo dpkg -i trivy_${TRIVY_VERSION#v}_Linux-64bit.deb

      - name: Run Trivy scan
        run: trivy fs --format json --output trivy-report.json .

      - name: Print HIGH/CRITICAL vulnerabilities with fixes
        shell: bash
        run: |
          echo ""
          echo "| Vulnerability ID | Package | Severity | Installed Version | Fixed Version |"
          echo "|-----------------|---------|---------|-----------------|---------------|"

          # Only print HIGH/CRITICAL vulnerabilities that have a FixedVersion
          jq -c '.Results[].Vulnerabilities[]? 
                  | select(.Severity=="HIGH" or .Severity=="CRITICAL") 
                  | select(.FixedVersion != null and .FixedVersion != "")' trivy-report.json | while read -r vuln; do
            VULN_ID=$(echo "$vuln" | jq -r '.VulnerabilityID')
            PACKAGE=$(echo "$vuln" | jq -r '.PkgName')
            SEVERITY=$(echo "$vuln" | jq -r '.Severity')
            INSTALLED=$(echo "$vuln" | jq -r '.InstalledVersion')
            FIXED=$(echo "$vuln" | jq -r '.FixedVersion')

            echo "| $VULN_ID | $PACKAGE | $SEVERITY | $INSTALLED | $FIXED |"
          done

          echo ""
          echo "Trivy scan completed. Only vulnerabilities with available fixes are listed."
