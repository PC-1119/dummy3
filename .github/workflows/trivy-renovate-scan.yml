name: Renovate Security Scan

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  trivy-scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies with verbose output
        run: |
          set -x
          sudo apt-get update
          sudo apt-get install -y wget jq
          # Get latest Trivy release dynamically
          TRIVY_VERSION=$(curl -s https://api.github.com/repos/aquasecurity/trivy/releases/latest | jq -r .tag_name)
          echo "Latest Trivy version is $TRIVY_VERSION"
          wget https://github.com/aquasecurity/trivy/releases/download/${TRIVY_VERSION}/trivy_${TRIVY_VERSION#v}_Linux-64bit.deb
          sudo dpkg -i trivy_${TRIVY_VERSION#v}_Linux-64bit.deb

      - name: Run Trivy scan with verbose output
        run: |
          set -x
          trivy fs --format json --output trivy-report.json .

      - name: Print vulnerabilities in JSON
        shell: bash
        run: |
          set -x
          echo "Filtered vulnerabilities with available fixes:"
          
          # Extract only LOW/HIGH/CRITICAL vulnerabilities with a FixedVersion
          jq '[.Results[].Vulnerabilities[]? 
                | select(.Severity=="LOW" or .Severity=="MEDIUM" or .Severity=="HIGH" or .Severity=="CRITICAL") 
                | select(.FixedVersion != null and .FixedVersion != "") 
                | {Package: .PkgName, Severity: .Severity, InstalledVersion: .InstalledVersion, FixedVersion: .FixedVersion}]' trivy-report.json
