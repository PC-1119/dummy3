name: Renovate

on:
  push:
    branches:
      - testing 
  workflow_dispatch:

permissions:
  id-token: write   # Needed for OIDC role assumption
  contents: read

jobs:
  renovate:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout repository
      - name: Checkout repo
        uses: actions/checkout@v4

      # 2️⃣ Configure AWS credentials via OIDC role assumption
      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: arn:aws:iam::819004394028:role/github-ecr-renovate
          aws-region: us-east-1

      # 3️⃣ Set up Renovate environment variables for AWS
      - name: Set up Renovate ECR env
        shell: bash
        run: |
          echo "RENOVATE_AWS_REGION=us-east-1" >> "$GITHUB_ENV"
          # The action already sets temporary credentials in the environment
          echo "RENOVATE_AWS_ACCESS_KEY_ID=$AWS_ACCESS_KEY_ID" >> "$GITHUB_ENV"
          echo "RENOVATE_AWS_SECRET_ACCESS_KEY=$AWS_SECRET_ACCESS_KEY" >> "$GITHUB_ENV"
          echo "RENOVATE_AWS_SESSION_TOKEN=$AWS_SESSION_TOKEN" >> "$GITHUB_ENV"

      # 4️⃣ Login to AWS ECR
      - name: Login to ECR
        run: |
          aws ecr get-login-password --region us-east-1 \
          | docker login \
            --username AWS \
            --password-stdin 819004394028.dkr.ecr.us-east-1.amazonaws.com

      # 5️⃣ Set up Renovate environment variables for GitHub (optional)
      - name: Set up Renovate GitHub env
        shell: bash
        run: |
          echo "RENOVATE_GITHUB_ACTOR=${{ github.actor }}" >> "$GITHUB_ENV"
          echo "RENOVATE_GITHUB_TOKEN=${{ secrets.RENOVATE_TOKEN }}" >> "$GITHUB_ENV"

      # 6️⃣ Run Renovate
      - name: Run Renovate
        uses: renovatebot/github-action@v46.1.4
        with:
          token: ${{ secrets.RENOVATE_TOKEN }}
          env-regex: "^(RENOVATE_.*|AWS_.*)$"
          configurationFile: .github/ci/renovate-config.js
        env:
          LOG_LEVEL: debug
          RENOVATE_REPOSITORIES: PC-1119/dummy3
